<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard TV</title>
  <style>
    :root {
      --bg: #ffffff;
      --scene-title-size: 18px;
      --card-title-size: 16px;
      --table-text-size: 11px;
      --meta-text-size: 10px;
      --row-height: 4px;
      --block-gap: 8px;
      --container-scale: 1;

      --text: #10131a;
      --muted: #687385;
      --line: #dde3ef;
      --card: #f7f9fc;
      --accent: #e8f1ff;
      --accent-strong: #d8e8ff;
      --shadow: 0 8px 24px rgba(16, 19, 26, 0.06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    .page { height: 100vh; padding: calc(10px * var(--container-scale)); display: grid; grid-template-rows: auto auto 1fr; gap: var(--block-gap); }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .title { font-size: calc(var(--scene-title-size) + 4px); font-weight: 700; letter-spacing: 0.02em; }
    .meta { color: var(--muted); font-size: var(--meta-text-size); white-space: nowrap; }
    .scene-indicator { display: flex; gap: 8px; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: #d6dbe5; transition: all .25s ease; }
    .dot.active { background: #111827; transform: scale(1.12); }
    .scene { display: none; height: 100%; animation: fadein .35s ease; }
    .scene.active { display: block; }
    @keyframes fadein { from { opacity: 0.18; } to { opacity: 1; } }
    .scene-header { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 6px; }
    .scene-header h2 { margin: 0; font-size: var(--scene-title-size); }
    .scene-sub { color: var(--muted); font-size: var(--meta-text-size); }
    .scene-split { height: calc(100% - 28px); display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.95fr); gap: max(4px, calc(var(--block-gap) * 0.75)); }
    .two-col { height: calc(100% - 28px); display: grid; grid-template-columns: 1fr 1fr; gap: max(4px, calc(var(--block-gap) * 0.75)); }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .card-head { padding: calc(8px * var(--container-scale)) calc(10px * var(--container-scale)) calc(7px * var(--container-scale)); border-bottom: 1px solid var(--line); background: #fff; }
    .card-head h3 { margin: 0; font-size: var(--card-title-size); }
    .card-head .caption { margin-top: 3px; color: var(--muted); font-size: var(--meta-text-size); }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: var(--table-text-size); }
    th, td { border-bottom: 1px solid var(--line); padding: var(--row-height) 6px; vertical-align: top; }
    th { background: #fff; text-align: left; font-size: var(--meta-text-size); color: var(--muted); position: sticky; top: 0; z-index: 1; }
    .table-wrap { overflow: hidden; min-height: 0; flex: 1; }
    .score-table tbody tr:last-child td, .heat-table tbody tr:last-child td, .team-table tbody tr:last-child td { border-bottom: none; }
    .col-place { width: 54px; text-align: center; }
    .col-athlete { width: auto; }
    .col-score, .col-total { width: 64px; text-align: center; }
    .col-team { width: auto; }
    .col-team-small { width: 68px; text-align: center; }
    th.points, td.points { background: var(--accent); }
    td.total-points, th.total-points { background: var(--accent-strong); font-weight: 700; }
    .athlete-line { display: flex; align-items: center; gap: 4px; font-size: calc(var(--table-text-size) + 2px); font-weight: 700; line-height: 1.15; }
    .athlete-meta { margin-top: 2px; color: var(--muted); font-size: var(--meta-text-size); line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .flag { width: 18px; height: 12px; object-fit: cover; border: 1px solid #d5d9e2; border-radius: 3px; flex: 0 0 auto; }
    .score-main { font-weight: 700; font-size: var(--table-text-size); line-height: 1.1; }
    .score-sub { margin-top: 3px; color: var(--muted); font-size: var(--meta-text-size); line-height: 1.1; min-height: 11px; }
    .note { padding: 6px 10px; font-size: var(--meta-text-size); color: var(--muted); border-top: 1px solid var(--line); background: #fff; }
    .division-heats { padding: 6px; display: grid; grid-template-columns: 1fr; gap: max(4px, calc(var(--block-gap) * 0.5)); overflow: hidden; }
    .workout-group { border: 2px solid var(--line); border-radius: 12px; padding: 5px; background: #fff; }
    .workout-group.wod1 { border-color: #cfe2ff; background: #f7fbff; }
    .workout-group.wod2 { border-color: #d6f5dd; background: #f7fdf8; }
    .workout-group.wod3 { border-color: #ffe2c6; background: #fffaf5; }
    .workout-group-title { font-size: calc(var(--meta-text-size) + 1px); font-weight: 800; padding: 2px 4px 5px 4px; }
    .workout-group.wod1 .workout-group-title { color: #2456a6; }
    .workout-group.wod2 .workout-group-title { color: #1f7a3d; }
    .workout-group.wod3 .workout-group-title { color: #a65b19; }
    .heat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: max(4px, calc(var(--block-gap) * 0.45)); align-content: start; }
    .heat-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); min-width: 0; }
    .heat-card-head { display: flex; justify-content: space-between; gap: 4px; align-items: center; padding: 3px 5px; background: #fff; border-bottom: 1px solid var(--line); }
    .heat-card-head strong { font-size: calc(var(--table-text-size) - 1px); line-height: 1.02; font-weight: 800; }
    .heat-table { font-size: calc(var(--table-text-size) - 3px); }
    .heat-table td { padding: 1px 3px; }
    .heat-table .athlete-line { font-size: calc(var(--table-text-size) - 2px); line-height: 1.02; }
    .heat-table .athlete-meta { font-size: calc(var(--meta-text-size) - 3px); line-height: 1.0; }
    .lane-col { width: 22px; text-align: center; font-weight: 700; }
    .empty { color: var(--muted); font-size: 16px; display: flex; align-items: center; justify-content: center; height: 100%; border: 1px dashed var(--line); border-radius: 12px; background: #fff; }
    .breakdown-list { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
    .breakdown-item { border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 6px 8px; }
    .breakdown-item strong { font-size: calc(var(--table-text-size) + 1px); }
    .breakdown-item .meta2 { margin-top: 3px; font-size: var(--meta-text-size); color: var(--muted); line-height: 1.2; }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">Competition TV</div>
      <div class="meta" id="meta">Загрузка...</div>
    </div>
    <div class="topbar">
      <div class="scene-indicator" id="sceneIndicator"></div>
      <div class="meta" id="sceneMeta">Экран 1 из 5</div>
    </div>

    <section class="scene active" id="scene-begscal-f"></section>
    <section class="scene" id="scene-begscal-m"></section>
    <section class="scene" id="scene-int-f"></section>
    <section class="scene" id="scene-int-m"></section>
    <section class="scene" id="scene-teams"></section>
  </div>

<script>
let sceneDurationMs = 10000;
const DATA_REFRESH_MS = 5000;
const SCENES = [
  { id: 'scene-begscal-f', label: 'Women BEG/SCAL', divId: 'BEGSCAL_F' },
  { id: 'scene-begscal-m', label: 'Men BEG/SCAL', divId: 'BEGSCAL_M' },
  { id: 'scene-int-f', label: 'Women Intermediate', divId: 'INT_F' },
  { id: 'scene-int-m', label: 'Men Intermediate', divId: 'INT_M' },
  { id: 'scene-teams', label: 'Командный зачёт' },
];
const DIV_SHORT = {
  BEGSCAL_F: 'BEG/SCAL — Women',
  BEGSCAL_M: 'BEG/SCAL — Men',
  INT_F: 'Intermediate — Women',
  INT_M: 'Intermediate — Men'
};
let cache = null;
let sceneIndex = 0;

function safe(v) { return v === null || v === undefined ? '' : String(v); }
function fmt(v) {
  if (v === null || v === undefined || v === '') return '—';
  return (typeof v === 'number') ? String(Number(v.toFixed ? v.toFixed(2) : v)).replace(/\.00$/, '') : String(v);
}
function metaLine(parts) { return parts.filter(Boolean).join(' · '); }
function athleteCell(r) {
  const flag = r.flag ? `<img class="flag" src="${r.flag}" alt="flag" />` : '';
  const clubBits = [];
  if (r.age) clubBits.push(`${r.age}`);
  if (r.club) clubBits.push(`<strong>${safe(r.club)}</strong>`);
  if (r.city) clubBits.push(safe(r.city));
  if (r.team_name && r.team_name !== '--' && r.team_name !== r.club) clubBits.push(safe(r.team_name));
  const meta = clubBits.join(' · ');
  return `<div class="athlete-line"><span>${safe(r.full_name)}</span>${flag}</div><div class="athlete-meta">${safe(meta)}</div>`;
}
function heatAthleteCell(a) {
  const flag = a.flag ? `<img class="flag" src="${a.flag}" alt="flag" />` : '';
  const meta = metaLine([a.club || '', a.city || '']);
  return `<div class="athlete-line"><span>${safe(a.full_name)}</span>${flag}</div><div class="athlete-meta">${safe(meta)}</div>`;
}
function scoreCell(scoreObj) {
  return `<div class="score-main">${fmt(scoreObj?.points)}</div><div class="score-sub">${safe(scoreObj?.result_text || '')}</div>`;
}
function buildWorkoutNameMap() {
  return {
    WOD1: cache?.heats?.WOD1?.title || 'Комплекс 1',
    WOD2: cache?.heats?.WOD2?.title || 'Комплекс 2',
    WOD3: cache?.heats?.WOD3?.title || 'Комплекс 3'
  };
}
function renderDivisionTable(div) {
  const note = cache?.tie_break_mode === 'priority_score'
    ? `ПР — место определено по приоритетному комплексу (${safe(cache?.priority_score_id)})`
    : 'Одинаковые суммы остаются на одинаковом месте';
  return `
    <div class="card">
      <div class="card-head">
        <h3>${safe(div.title)}</h3>
        <div class="caption">Флаг · возраст · клуб · город</div>
      </div>
      <div class="table-wrap">
        <table class="score-table">
          <thead>
            <tr>
              <th class="col-place">#</th>
              <th class="col-athlete">Участник</th>
              <th class="col-score points">W1</th>
              <th class="col-score points">W2A</th>
              <th class="col-score points">W2B</th>
              <th class="col-score points">W3</th>
              <th class="col-total total-points">Σ</th>
            </tr>
          </thead>
          <tbody>
            ${(div.rows || []).map(r => `
              <tr>
                <td class="col-place">${safe(r.place_label || fmt(r.place))}</td>
                <td class="col-athlete">${athleteCell(r)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD1)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD2A)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD2B)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD3)}</td>
                <td class="col-total total-points"><div class="score-main">${fmt(r.total)}</div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="note">${note}</div>
    </div>`;
}
function renderDivisionHeats(divId) {
  const workoutNames = buildWorkoutNameMap();
  const groups = ['WOD1', 'WOD2', 'WOD3'].map(workoutId => {
    const heats = cache?.heats?.[workoutId]?.divisions?.[divId] || [];
    if (!heats.length) return '';
    const name = safe(workoutNames[workoutId] || workoutId);
    const match = name.match(/(\d+)/);
    const workoutNum = match ? match[1] : workoutId;
    const cards = heats.map(h => `
      <div class="heat-card">
        <div class="heat-card-head">
          <strong>Заход ${fmt(h.heat)}</strong>
        </div>
        <table class="heat-table"><tbody>
          ${(h.assignments || []).map(a => `<tr><td class="lane-col">${fmt(a.lane)}</td><td>${heatAthleteCell(a)}</td></tr>`).join('')}
        </tbody></table>
      </div>`).join('');
    return `<div class="workout-group ${workoutId.toLowerCase()}">
      <div class="workout-group-title">Комплекс ${workoutNum}</div>
      <div class="heat-grid">${cards}</div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-head">
        <h3>Заходы</h3>
        <div class="caption">Группы оставлены по цветам</div>
      </div>
      <div class="table-wrap division-heats">
        ${groups || '<div class="empty">Заходы ещё не сформированы</div>'}
      </div>
      <div class="note">Показаны только заходы текущей категории.</div>
    </div>`;
}
function renderDivisionScene(sceneId, divId) {
  const root = document.getElementById(sceneId);
  const div = cache?.divisions?.[divId];
  if (!div) {
    root.innerHTML = `<div class="scene-header"><h2>${safe(DIV_SHORT[divId] || divId)}</h2><div class="scene-sub">Нет данных</div></div><div class="empty">Нет данных по категории</div>`;
    return;
  }
  root.innerHTML = `
    <div class="scene-header">
      <h2>${safe(DIV_SHORT[divId])}</h2>
      <div class="scene-sub">Таблица слева, заходы справа</div>
    </div>
    <div class="scene-split">${renderDivisionTable(div)}${renderDivisionHeats(divId)}</div>`;
}
function renderTeamsScene() {
  const root = document.getElementById('scene-teams');
  const rows = cache?.clubs?.rows || cache?.teams?.rows || [];
  const left = `
    <div class="card">
      <div class="card-head">
        <h3>Рейтинг клубов</h3>
        <div class="caption">Общий зачёт по всем дивизионам</div>
      </div>
      <div class="table-wrap">
        <table class="team-table">
          <thead>
            <tr>
              <th class="col-place">#</th>
              <th class="col-team">Клуб</th>
              <th class="col-team-small points">Очки</th>
              <th class="col-team-small points">Участ.</th>
              <th class="col-team-small points">1х</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td class="col-place">${fmt(r.place)}</td>
                <td class="col-team"><div class="athlete-line"><span>${safe(r.team_name)}</span></div><div class="athlete-meta">${fmt(r.contributors)} зачётных результата</div></td>
                <td class="col-team-small points"><div class="score-main">${fmt(r.points)}</div></td>
                <td class="col-team-small points"><div class="score-main">${fmt(r.participants_count)}</div></td>
                <td class="col-team-small points"><div class="score-main">${fmt(r.first_places)}</div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="note">При равенстве очков выше клуб с меньшим составом, затем по числу 1 мест и результатам приоритетного комплекса.</div>
    </div>`;

  const right = `
    <div class="card">
      <div class="card-head">
        <h3>Кто принёс очки</h3>
        <div class="caption">Расшифровка командного зачёта</div>
      </div>
      <div class="table-wrap breakdown-list">
        ${rows.map(team => {
          const top = (team.breakdown || []).slice(0, 4);
          const body = top.length
            ? top.map(item => `<div class="breakdown-item"><strong>${safe(team.team_name)}</strong><div class="meta2">${safe(item.full_name)} · ${safe(item.division_title)} · место ${safe(item.place_label)} · +${fmt(item.awarded_points)} очк.</div></div>`).join('')
            : `<div class="breakdown-item"><strong>${safe(team.team_name)}</strong><div class="meta2">Пока без зачётных баллов</div></div>`;
          return body;
        }).join('')}
      </div>
      <div class="note">ПР — место определено через приоритетный комплекс при равенстве суммы очков.</div>
    </div>`;

  root.innerHTML = `
    <div class="scene-header">
      <h2>Клубный зачёт</h2>
      <div class="scene-sub">Пятый отдельный экран</div>
    </div>
    <div class="two-col">${left}${right}</div>`;
}
function applyDisplaySettings() {
  const display = cache?.display?.main || {};
  const root = document.documentElement;
  root.style.setProperty('--scene-title-size', `${display.section_title_size || 18}px`);
  root.style.setProperty('--card-title-size', `${display.card_title_size || 16}px`);
  root.style.setProperty('--table-text-size', `${display.table_text_size || 11}px`);
  root.style.setProperty('--meta-text-size', `${display.meta_text_size || 10}px`);
  root.style.setProperty('--row-height', `${display.row_height || 4}px`);
  root.style.setProperty('--block-gap', `${display.block_gap || 8}px`);
  root.style.setProperty('--container-scale', `${display.container_scale || 1}`);
}
function renderAll() {
  if (!cache) return;
  applyDisplaySettings();
  document.getElementById('meta').textContent = `Обновлено: ${cache.generated_at}`;
  sceneDurationMs = Math.max(3000, Number(cache?.tv_scene_duration_sec || 10) * 1000);
  renderDivisionScene('scene-begscal-f', 'BEGSCAL_F');
  renderDivisionScene('scene-begscal-m', 'BEGSCAL_M');
  renderDivisionScene('scene-int-f', 'INT_F');
  renderDivisionScene('scene-int-m', 'INT_M');
  renderTeamsScene();
  renderSceneState();
}
function renderSceneState() {
  document.querySelectorAll('.scene').forEach((el, idx) => { el.classList.toggle('active', idx === sceneIndex); });
  const indicator = document.getElementById('sceneIndicator');
  indicator.innerHTML = SCENES.map((scene, idx) => `<div class="dot ${idx === sceneIndex ? 'active' : ''}" title="${scene.label}"></div>`).join('');
  document.getElementById('sceneMeta').textContent = `${SCENES[sceneIndex].label} · экран ${sceneIndex + 1} из ${SCENES.length}`;
}
function nextScene() { sceneIndex = (sceneIndex + 1) % SCENES.length; renderSceneState(); }
async function load() {
  const res = await fetch(`results.json?ts=${Date.now()}`);
  cache = await res.json();
  renderAll();
}
let sceneTimer = null;
let appliedSceneDurationMs = null;
function restartSceneTimer() {
  if (sceneTimer) clearInterval(sceneTimer);
  sceneTimer = setInterval(() => nextScene(), sceneDurationMs);
  appliedSceneDurationMs = sceneDurationMs;
}
async function initialLoad() {
  await load();
  restartSceneTimer();
}
initialLoad();
setInterval(async () => {
  await load();
  if (appliedSceneDurationMs !== sceneDurationMs) restartSceneTimer();
}, DATA_REFRESH_MS);
</script>
</body>
</html>
