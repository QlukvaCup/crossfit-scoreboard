<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard TV</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #10131a;
      --muted: #687385;
      --line: #dde3ef;
      --card: #f7f9fc;
      --accent: #e8f1ff;
      --accent-strong: #d8e8ff;
      --shadow: 0 8px 24px rgba(16, 19, 26, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .page {
      height: 100vh;
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .meta {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }
    .scene-indicator {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #d6dbe5;
      transition: all .25s ease;
    }
    .dot.active { background: #111827; transform: scale(1.12); }

    .scene {
      display: none;
      height: 100%;
      animation: fadein .35s ease;
    }
    .scene.active { display: block; }
    @keyframes fadein {
      from { opacity: 0.18; }
      to { opacity: 1; }
    }

    .scene-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 6px;
    }
    .scene-header h2 {
      margin: 0;
      font-size: 18px;
    }
    .scene-sub {
      color: var(--muted);
      font-size: 10px;
    }

    .two-col {
      height: calc(100% - 28px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .card-head {
      padding: 8px 10px 7px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .card-head h3 {
      margin: 0;
      font-size: 16px;
    }
    .card-head .caption {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 11px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 4px 6px;
      vertical-align: top;
    }
    th {
      background: #fff;
      text-align: left;
      font-size: 10px;
      color: var(--muted);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .table-wrap {
      overflow: hidden;
      min-height: 0;
      flex: 1;
    }
    .score-table tbody tr:last-child td,
    .heat-table tbody tr:last-child td {
      border-bottom: none;
    }
    .col-place { width: 42px; text-align: center; }
    .col-athlete { width: auto; }
    .col-score, .col-total { width: 64px; text-align: center; }
    th.points, td.points {
      background: var(--accent);
    }
    td.total-points, th.total-points {
      background: var(--accent-strong);
      font-weight: 700;
    }
    .athlete-line {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.15;
    }
    .athlete-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .flag {
      width: 18px;
      height: 12px;
      object-fit: cover;
      border: 1px solid #d5d9e2;
      border-radius: 3px;
      flex: 0 0 auto;
    }
    .score-main {
      font-weight: 700;
      font-size: 10px;
      line-height: 1.1;
    }
    .score-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.1;
      min-height: 11px;
    }

    .heats-layout {
      height: calc(100% - 28px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      align-items: start;
    }
    .heat-column {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .heat-column-title {
      font-size: 15px;
      font-weight: 700;
      padding: 6px 8px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .heat-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .heat-card-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 6px 8px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .heat-card-head strong { font-size: 16px; }
    .heat-card-head span { color: var(--muted); font-size: 12px; }
    .heat-table { font-size: 12px; }
    .lane-col { width: 42px; text-align: center; font-weight: 700; }
    .empty {
      color: var(--muted);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">Competition TV</div>
      <div class="meta" id="meta">Загрузка...</div>
    </div>
    <div class="topbar">
      <div class="scene-indicator" id="sceneIndicator"></div>
      <div class="meta" id="sceneMeta">Экран 1 из 3</div>
    </div>

    <section class="scene active" id="scene-begscal"></section>
    <section class="scene" id="scene-int"></section>
    <section class="scene" id="scene-heats"></section>
  </div>

<script>
const SCENE_DURATION_MS = 10000;
const DATA_REFRESH_MS = 5000;
const SCENES = [
  { id: 'scene-begscal', label: 'BEG/SCAL', divs: ['BEGSCAL_F', 'BEGSCAL_M'] },
  { id: 'scene-int', label: 'Intermediate', divs: ['INT_F', 'INT_M'] },
  { id: 'scene-heats', label: 'Заходы', divs: ['BEGSCAL_F', 'BEGSCAL_M', 'INT_F', 'INT_M'] },
];
const DIV_SHORT = {
  BEGSCAL_F: 'BEG/SCAL — Women',
  BEGSCAL_M: 'BEG/SCAL — Men',
  INT_F: 'Intermediate — Women',
  INT_M: 'Intermediate — Men'
};
let cache = null;
let sceneIndex = 0;

function safe(v) { return v === null || v === undefined ? '' : String(v); }
function fmt(v) {
  if (v === null || v === undefined || v === '') return '—';
  return (typeof v === 'number') ? String(Number(v.toFixed ? v.toFixed(2) : v)).replace(/\.00$/, '') : String(v);
}
function metaLine(parts) {
  return parts.filter(Boolean).join(' · ');
}
function athleteCell(r) {
  const flag = r.flag ? `<img class="flag" src="${r.flag}" alt="flag" />` : '';
  const meta = metaLine([r.age ? `${r.age}` : '', r.club || '', r.city || '']);
  return `<div class="athlete-line"><span>${safe(r.full_name)}</span>${flag}</div><div class="athlete-meta">${safe(meta)}</div>`;
}
function scoreCell(scoreObj) {
  return `<div class="score-main">${fmt(scoreObj?.points)}</div><div class="score-sub">${safe(scoreObj?.result_text || '')}</div>`;
}
function renderDivisionTable(divId, div) {
  return `
    <div class="card">
      <div class="card-head">
        <h3>${safe(div.title)}</h3>
        <div class="caption">Флаг · возраст · клуб · город</div>
      </div>
      <div class="table-wrap">
        <table class="score-table">
          <thead>
            <tr>
              <th class="col-place">#</th>
              <th class="col-athlete">Участник</th>
              <th class="col-score points">W1</th>
              <th class="col-score points">W2A</th>
              <th class="col-score points">W2B</th>
              <th class="col-score points">W3</th>
              <th class="col-total total-points">Σ</th>
            </tr>
          </thead>
          <tbody>
            ${(div.rows || []).map(r => `
              <tr>
                <td class="col-place">${fmt(r.place)}</td>
                <td class="col-athlete">${athleteCell(r)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD1)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD2A)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD2B)}</td>
                <td class="col-score points">${scoreCell(r.scores?.WOD3)}</td>
                <td class="col-total total-points"><div class="score-main">${fmt(r.total)}</div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}
function renderSceneTables(sceneId, sceneTitle, divIds) {
  const root = document.getElementById(sceneId);
  const cards = divIds
    .map(divId => cache?.divisions?.[divId] ? renderDivisionTable(divId, cache.divisions[divId]) : '')
    .join('');
  root.innerHTML = `
    <div class="scene-header">
      <h2>${sceneTitle}</h2>
      <div class="scene-sub">Лидеры по категориям</div>
    </div>
    <div class="two-col">${cards || '<div class="empty">Нет данных</div>'}</div>`;
}
function heatAthleteCell(a) {
  const flag = a.flag ? `<img class="flag" src="${a.flag}" alt="flag" />` : '';
  const meta = metaLine([a.club || '', a.city || '']);
  return `<div class="athlete-line"><span>${safe(a.full_name)}</span>${flag}</div><div class="athlete-meta">${safe(meta)}</div>`;
}
function buildWorkoutNameMap() {
  return {
    WOD1: cache?.heats?.WOD1?.title || 'Комплекс 1',
    WOD2: cache?.heats?.WOD2?.title || 'Комплекс 2',
    WOD3: cache?.heats?.WOD3?.title || 'Комплекс 3'
  };
}
function renderHeatsScene() {
  const root = document.getElementById('scene-heats');
  const workoutNames = buildWorkoutNameMap();
  const columns = ['BEGSCAL_F', 'BEGSCAL_M', 'INT_F', 'INT_M'].map(divId => {
    const cards = ['WOD1', 'WOD2', 'WOD3'].flatMap(workoutId => {
      const heats = cache?.heats?.[workoutId]?.divisions?.[divId] || [];
      return heats.map(h => `
        <div class="heat-card">
          <div class="heat-card-head">
            <strong>${workoutNames[workoutId]} · Заход ${fmt(h.heat)}</strong>
            <span>${safe(DIV_SHORT[divId])}</span>
          </div>
          <table class="heat-table">
            <tbody>
              ${(h.assignments || []).map(a => `
                <tr>
                  <td class="lane-col">${fmt(a.lane)}</td>
                  <td>${heatAthleteCell(a)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`);
    }).join('');

    return `
      <div class="heat-column">
        <div class="heat-column-title">${safe(DIV_SHORT[divId])}</div>
        ${cards || '<div class="empty">Заходы ещё не сформированы</div>'}
      </div>`;
  }).join('');

  root.innerHTML = `
    <div class="scene-header">
      <h2>Заходы</h2>
      <div class="scene-sub">Все категории и все полы</div>
    </div>
    <div class="heats-layout">${columns}</div>`;
}
function renderAll() {
  if (!cache) return;
  document.getElementById('meta').textContent = `Обновлено: ${cache.generated_at}`;
  renderSceneTables('scene-begscal', 'BEG/SCAL', ['BEGSCAL_F', 'BEGSCAL_M']);
  renderSceneTables('scene-int', 'Intermediate', ['INT_F', 'INT_M']);
  renderHeatsScene();
  renderSceneState();
}
function renderSceneState() {
  document.querySelectorAll('.scene').forEach((el, idx) => {
    el.classList.toggle('active', idx === sceneIndex);
  });
  const indicator = document.getElementById('sceneIndicator');
  indicator.innerHTML = SCENES.map((scene, idx) => `<div class="dot ${idx === sceneIndex ? 'active' : ''}" title="${scene.label}"></div>`).join('');
  document.getElementById('sceneMeta').textContent = `${SCENES[sceneIndex].label} · экран ${sceneIndex + 1} из ${SCENES.length}`;
}
function nextScene() {
  sceneIndex = (sceneIndex + 1) % SCENES.length;
  renderSceneState();
}
async function load() {
  const res = await fetch(`results.json?ts=${Date.now()}`);
  cache = await res.json();
  renderAll();
}
load();
setInterval(load, DATA_REFRESH_MS);
setInterval(nextScene, SCENE_DURATION_MS);
</script>
</body>
</html>
