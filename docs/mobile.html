<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard Mobile</title>
  <style>
    :root { --section-title-size: 22px; --card-title-size: 18px; --table-text-size: 12px; --meta-text-size: 11px; --row-height: 6px; --block-gap: 12px; --container-scale: 1; }
    body { font-family: Arial, sans-serif; margin: var(--block-gap, 12px); }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: calc(10px * var(--container-scale)); margin-bottom: var(--block-gap); }
    .muted { color: #777; font-size: var(--meta-text-size); }
    .flag { width: 18px; height: 12px; object-fit: cover; border: 1px solid #ddd; border-radius: 3px; vertical-align: middle; margin-left: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: var(--table-text-size); }
    th, td { border-bottom: 1px solid #eee; padding: var(--row-height) 4px; text-align: left; vertical-align: top; }
    th.points, td.points { background: #eef5ff; }
    .meta2 { color:#666; font-size: var(--meta-text-size); line-height: 1.25; }
    .res { display:block; color:#666; font-size: calc(var(--meta-text-size) - 1px); }
    .heats-row { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: calc(var(--block-gap) * 0.75); padding-bottom:4px; align-items:start; }
    .heat-col { min-width: 0; border:1px solid #eee; border-radius:8px; padding: calc(8px * var(--container-scale)); font-size: var(--table-text-size); }
    .heat-title { margin-bottom:6px; font-weight:700; font-size: var(--table-text-size); line-height: 1.15; }
    .lane { display:grid; grid-template-columns: 24px 1fr; gap: max(4px, calc(var(--block-gap) * 0.5)); padding: var(--row-height) 0; border-bottom:1px dashed #eee; font-size: var(--table-text-size); line-height: 1.15; }
    .lane:last-child { border-bottom:none; }
    .club-pill { font-weight: 700; color: #111827; }
    .selectors { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 12px; }
    .selector { display:flex; flex-direction:column; gap:4px; font-size:12px; color:#374151; }
    .selector select { min-width:160px; padding:10px 12px; border:2px solid #4f8cff; border-radius:10px; background:#eef5ff; color:#111827; font-weight:700; box-shadow:0 1px 0 rgba(0,0,0,.04); }
    .selector select:focus { outline:none; border-color:#1d4ed8; background:#e0edff; box-shadow:0 0 0 3px rgba(79,140,255,.18); }
    .selector select:hover { background:#e8f0ff; }

    .workouts-box { display:flex; flex-direction:column; gap:8px; }
    .wod-item { border:1px solid #e5e7eb; border-left:4px solid #9ca3af; border-radius:10px; padding:10px 12px; background:#fff; }
    .wod-item.wod1 { border-left-color:#7aaef7; }
    .wod-item.wod2 { border-left-color:#7cd790; }
    .wod-item.wod3 { border-left-color:#ffb56a; }
    .wod-item.wod4, .wod-item.wod5, .wod-item.wod6, .wod-item.wod7, .wod-item.wod8 { border-left-color:#c8b5ff; }
    .wod-head { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
    .wod-code { font-weight:700; font-size:14px; }
    .wod-type { color:#666; font-size:11px; white-space:nowrap; }
    .wod-cap { margin-top:4px; font-size:12px; }
    .wod-desc { margin-top:6px; color:#666; font-size:11px; white-space:pre-wrap; line-height:1.25; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="muted" id="meta">Loading...</div>
  <div class="selectors">
    <label class="selector">
      <span>Раздел</span>
      <select id="viewSel">
        <option value="table">Таблицы</option>
        <option value="heats">Заходы</option>
        <option value="workouts">Комплексы</option>
      </select>
    </label>
    <label class="selector">
      <span>Категория</span>
      <select id="divSel"></select>
    </label>
    <label class="selector" id="wodSelectorWrap">
      <span id="wodLabel">Заходы</span>
      <select id="wodSel"></select>
    </label>
  </div>
  <div class="box" id="tableBox"></div>
  <div class="box hidden" id="heatsBox"></div>
  <div class="box hidden" id="workoutsBox"></div>
<script>
const DIVS = ["BEGSCAL_F","BEGSCAL_M","INT_F","INT_M","CLUBS"];
let cache = null;
const viewSel = document.getElementById('viewSel');
const divSel = document.getElementById('divSel');
const wodSel = document.getElementById('wodSel');
const wodLabel = document.getElementById('wodLabel');
const wodSelectorWrap = document.getElementById('wodSelectorWrap');
const tableBox = document.getElementById('tableBox');
const heatsBox = document.getElementById('heatsBox');
const workoutsBox = document.getElementById('workoutsBox');

function fmt(v){
  if(v===null||v===undefined||v==='') return '—';
  return (typeof v==='number') ? String(Number(v.toFixed ? v.toFixed(2) : v)).replace(/\.00$/,'') : String(v);
}
function safe(s){ return s===null||s===undefined ? '' : String(s); }

function pluralResults(n){
  const value = Number(n) || 0;
  const mod10 = value % 10;
  const mod100 = value % 100;
  if(mod10 === 1 && mod100 !== 11) return 'зачётный результат';
  if(mod10 >= 2 && mod10 <= 4 && !(mod100 >= 12 && mod100 <= 14)) return 'зачётных результата';
  return 'зачётных результатов';
}

DIVS.forEach(id => {
  const opt = document.createElement('option');
  opt.value = id;
  opt.textContent = id;
  divSel.appendChild(opt);
});

function currentWorkoutRows(){
  const divId = divSel.value;
  const div = cache?.workouts?.divisions?.[divId];
  return div?.rows || [];
}

function refreshWodOptions(){
  const view = viewSel.value;
  const prev = wodSel.value;
  wodSel.innerHTML = '';

  let ids = [];
  if(view === 'heats'){
    ids = Object.keys(cache?.heats || {}).filter(Boolean);
    wodLabel.textContent = 'Заходы';
  } else if(view === 'workouts'){
    ids = currentWorkoutRows().map(r => r.code).filter(Boolean);
    wodLabel.textContent = 'Комплекс';
  }

  ids.forEach(id => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = id;
    wodSel.appendChild(opt);
  });

  if(ids.includes(prev)) {
    wodSel.value = prev;
  } else if(ids.length) {
    wodSel.value = ids[0];
  }

  const needWod = view === 'heats' || view === 'workouts';
  wodSelectorWrap.classList.toggle('hidden', !needWod || divSel.value === 'CLUBS');
}

function renderTable(){
  const id = divSel.value;

  if(id === 'CLUBS'){
    renderTeamsInline();
    return;
  }

  const div = cache.divisions?.[id];
  if(!div){
    tableBox.innerHTML='Нет данных';
    return;
  }

  const notes = (div.tie_break_notes || []).map(item => safe(item));
  const notesHtml = notes.length ? `<div class="muted" style="margin-top:10px">${notes.join('<br>')}</div>` : '';

  let html = `<h3>${safe(div.title)}</h3><table><thead><tr><th>#</th><th>Атлет</th><th class="points">W1</th><th class="points">W2A</th><th class="points">W2B</th><th class="points">W3</th><th class="points">Σ</th></tr></thead><tbody>`;

  (div.rows||[]).forEach(r => {
    const flag = r.flag ? `<img class="flag" src="${r.flag}" />` : '';
    const club = (r.club || r.club_name || '').trim();
    const metaHtml = [
      r.age ? `${r.age}` : '',
      safe(r.region || r.city || ''),
      club ? `<span class="club-pill">${safe(club)}</span>` : ''
    ].filter(Boolean).join(' · ');

    html += `<tr><td>${safe(r.place_label || fmt(r.place))}</td><td>${safe(r.full_name)}${flag}<div class="meta2">${metaHtml}</div></td>` +
      `<td class="points">${fmt(r.scores?.WOD1?.points)}<span class="res">${safe(r.scores?.WOD1?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.scores?.WOD2A?.points)}<span class="res">${safe(r.scores?.WOD2A?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.scores?.WOD2B?.points)}<span class="res">${safe(r.scores?.WOD2B?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.scores?.WOD3?.points)}<span class="res">${safe(r.scores?.WOD3?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.total)}${safe(r.tie_break_marker || '')}</td></tr>`;
  });

  html += '</tbody></table>' + notesHtml;
  tableBox.innerHTML = html;
}

function renderTeamsInline(){
  const rows = cache.clubs?.rows || [];
  const scored = rows.filter(r => Number(r.points || 0) > 0);
  let html = `<h3>Клубный зачёт</h3><table><thead><tr><th>#</th><th>Клуб</th><th class="points">Очки</th><th class="points">Участ.</th><th class="points">1х</th></tr></thead><tbody>`;

  rows.forEach((r, idx) => {
    const clubName = r.club_name || r.club || `Клуб ${idx + 1}`;
    const flag = r.club_flag ? `<img class="flag" src="${r.club_flag}" />` : '';
    html += `<tr><td>${fmt(r.place)}</td><td>${safe(clubName)}${flag}<div class="meta2">${safe(r.club_city || '')}</div></td><td class="points">${fmt(r.points)}</td><td class="points">${fmt(r.participants_count)}</td><td class="points">${fmt(r.first_places)}</td></tr>`;
  });

  html += `</tbody></table>`;

  if(scored.length){
    html += `<div class="muted" style="margin-top:8px;">Клубы, которые принесли очки</div>`;
    scored.forEach(team => {
      html += `<div class="meta2" style="margin-top:6px;"><strong>${safe(team.club_name)}</strong>${team.club_city ? ` · ${safe(team.club_city)}` : ''}</div>`;
      (team.breakdown || []).forEach(item => {
        html += `<div class="meta2" style="margin-top:4px;">${safe(item.full_name)} · ${safe(item.division_title)} · место ${safe(item.place_label)} · +${fmt(item.awarded_points)}</div>`;
      });
    });
  }

  tableBox.innerHTML = html;
}

function workoutClass(code){
  const m = safe(code).match(/WOD(\d+)/);
  return m ? `wod${m[1]}` : '';
}

function renderWorkoutSingle(){
  const divId = divSel.value;
  if(divId === 'CLUBS'){
    workoutsBox.innerHTML = '';
    return;
  }

  const rows = currentWorkoutRows();
  let html = `<h3>Комплексы</h3>`;
  if(!rows.length){
    workoutsBox.innerHTML = html + '<div class="muted" style="margin-top:8px;">Комплексы ещё не заполнены</div>';
    return;
  }

  const selected = rows.find(r => r.code === wodSel.value) || rows[0];
  if(!selected){
    workoutsBox.innerHTML = html + '<div class="muted" style="margin-top:8px;">Комплексы ещё не заполнены</div>';
    return;
  }

  html += `<div class="workouts-box"><div class="wod-item ${workoutClass(selected.code)}"><div class="wod-head"><div class="wod-code">${safe(selected.label || selected.code)}</div><div class="wod-type">${safe(selected.type || '')}</div></div>${selected.time_cap ? `<div class="wod-cap">Лимит: ${safe(selected.time_cap)}</div>` : ''}${selected.description ? `<div class="wod-desc">${safe(selected.description)}</div>` : ''}</div></div>`;
  workoutsBox.innerHTML = html;
}

function renderHeats(){
  const divId = divSel.value;
  const wodId = wodSel.value;

  if(divId === 'CLUBS'){
    heatsBox.innerHTML = '';
    return;
  }

  const heats = cache.heats?.[wodId]?.divisions?.[divId] || [];
  let html = `<h3>${safe(cache.heats?.[wodId]?.title || wodId)} — заходы</h3>`;

  if(!heats.length){
    heatsBox.innerHTML = html + 'Нет заходов';
    return;
  }

  html += `<div class="heats-row">`;
  heats.forEach(h => {
    html += `<div class="heat-col"><div class="heat-title">Заход ${h.heat}</div>`;
    (h.assignments||[]).forEach(a => {
      const flag = a.flag ? `<img class="flag" src="${a.flag}" />` : '';
      html += `<div class="lane"><div>${a.lane}</div><div>${safe(a.full_name)}${flag}</div></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  heatsBox.innerHTML = html;
}

function applyDisplaySettings(){
  const display = cache?.display?.mobile || {};
  const root = document.documentElement;
  root.style.setProperty('--section-title-size', `${display.section_title_size || 22}px`);
  root.style.setProperty('--card-title-size', `${display.card_title_size || 18}px`);
  root.style.setProperty('--table-text-size', `${display.table_text_size || 12}px`);
  root.style.setProperty('--meta-text-size', `${display.meta_text_size || 11}px`);
  root.style.setProperty('--row-height', `${display.row_height || 6}px`);
  root.style.setProperty('--block-gap', `${display.block_gap || 12}px`);
  root.style.setProperty('--container-scale', `${display.container_scale || 1}`);
}

function renderCurrent(){
  if(!cache) return;

  refreshWodOptions();

  const view = viewSel.value;
  const clubsMode = divSel.value === 'CLUBS';

  tableBox.classList.toggle('hidden', view !== 'table');
  heatsBox.classList.toggle('hidden', view !== 'heats');
  workoutsBox.classList.toggle('hidden', view !== 'workouts');

  if(view === 'table'){
    renderTable();
  } else if(view === 'heats'){
    if(clubsMode){
      heatsBox.innerHTML = '<h3>Заходы</h3><div class="muted">Для клубного зачёта заходы не используются</div>';
    } else {
      renderHeats();
    }
  } else if(view === 'workouts'){
    if(clubsMode){
      workoutsBox.innerHTML = '<h3>Комплексы</h3><div class="muted">Для клубного зачёта комплексы не используются</div>';
    } else {
      renderWorkoutSingle();
    }
  }
}

async function load(){
  const currentDiv = divSel.value;
  const currentView = viewSel.value;
  const currentWod = wodSel.value;

  const res = await fetch(`results.json?ts=${Date.now()}`);
  cache = await res.json();
  document.getElementById('meta').textContent = `Обновлено: ${cache.generated_at}`;
  applyDisplaySettings();

  if(currentDiv && [...divSel.options].some(o => o.value === currentDiv)) divSel.value = currentDiv;
  if(currentView) viewSel.value = currentView;
  refreshWodOptions();
  if(currentWod && [...wodSel.options].some(o => o.value === currentWod)) wodSel.value = currentWod;

  renderCurrent();
}

divSel.onchange = renderCurrent;
viewSel.onchange = renderCurrent;
wodSel.onchange = renderCurrent;

load();
setInterval(load, 5000);
</script>
</body>
</html>
