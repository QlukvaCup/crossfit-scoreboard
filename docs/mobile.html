<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard Mobile</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-bottom: 12px; }
    .muted { color: #777; font-size: 12px; }
    .flag { width: 18px; height: 12px; object-fit: cover; border: 1px solid #ddd; border-radius: 3px; vertical-align: middle; margin-left: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid #eee; padding: 6px 4px; text-align: left; vertical-align: top; }
    th.points, td.points { background: #eef5ff; }
    .meta2 { color:#666; font-size: 11px; line-height: 1.25; }
    .res { display:block; color:#666; font-size:10px; }
    .heats-row { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; }
    .heat-col { min-width: 180px; flex:0 0 180px; border:1px solid #eee; border-radius:8px; padding:8px; }
    .heat-title { margin-bottom:6px; font-weight:700; }
    .lane { display:grid; grid-template-columns: 24px 1fr; gap:8px; padding:4px 0; border-bottom:1px dashed #eee; }
    .lane:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <div class="muted" id="meta">Loading...</div>
  <label>Таблица: <select id="divSel"></select></label>
  <label style="margin-left:8px;">Заходы: <select id="wodSel"></select></label>
  <div class="box" id="tableBox"></div>
  <div class="box" id="heatsBox"></div>
<script>
const DIVS = ["BEGSCAL_F","BEGSCAL_M","INT_F","INT_M"];
let cache = null;
const divSel = document.getElementById('divSel');
const wodSel = document.getElementById('wodSel');
function fmt(v){ if(v===null||v===undefined) return '—'; return (typeof v==='number') ? String(Number(v.toFixed ? v.toFixed(2) : v)).replace(/\.00$/,'') : String(v); }
function safe(s){ return s===null||s===undefined ? '' : String(s); }
DIVS.forEach(id => { const opt=document.createElement('option'); opt.value=id; opt.textContent=id; divSel.appendChild(opt); });
['WOD1','WOD2','WOD3'].forEach(id => { const opt=document.createElement('option'); opt.value=id; opt.textContent=id; wodSel.appendChild(opt); });
function renderTable(){
  const id = divSel.value; const div = cache.divisions?.[id];
  if(!div){ document.getElementById('tableBox').innerHTML='Нет данных'; return; }
  let html = `<h3>${safe(div.title)}</h3><table><thead><tr><th>#</th><th>Атлет</th><th class="points">W1</th><th class="points">W2A</th><th class="points">W2B</th><th class="points">W3</th><th class="points">Σ</th></tr></thead><tbody>`;
  (div.rows||[]).forEach(r => {
    const flag = r.flag ? `<img class="flag" src="${r.flag}" />` : '';
    const meta = [r.age ? `${r.age}` : '', r.club || '', r.city || ''].filter(Boolean).join(' · ');
    html += `<tr><td>${fmt(r.place)}</td><td>${safe(r.full_name)}${flag}<div class="meta2">${safe(meta)}</div></td>` +
      `<td class="points">${fmt(r.scores?.WOD1?.points)}<span class="res">${safe(r.scores?.WOD1?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.scores?.WOD2A?.points)}<span class="res">${safe(r.scores?.WOD2A?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.scores?.WOD2B?.points)}<span class="res">${safe(r.scores?.WOD2B?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.scores?.WOD3?.points)}<span class="res">${safe(r.scores?.WOD3?.result_text)}</span></td>` +
      `<td class="points">${fmt(r.total)}</td></tr>`;
  });
  html += '</tbody></table>'; document.getElementById('tableBox').innerHTML = html;
}
function renderHeats(){
  const divId = divSel.value; const wodId = wodSel.value; const heats = cache.heats?.[wodId]?.divisions?.[divId] || [];
  let html = `<h3>${safe(cache.heats?.[wodId]?.title || wodId)} — заходы</h3>`;
  if(!heats.length){ document.getElementById('heatsBox').innerHTML = html + 'Нет заходов'; return; }
  html += `<div class="heats-row">`;
  heats.forEach(h => {
    html += `<div class="heat-col"><div class="heat-title">Заход ${h.heat}</div>`;
    (h.assignments||[]).forEach(a => { const flag = a.flag ? `<img class="flag" src="${a.flag}" />` : ''; html += `<div class="lane"><div>${a.lane}</div><div>${safe(a.full_name)}${flag}</div></div>`; });
    html += `</div>`;
  });
  html += `</div>`;
  document.getElementById('heatsBox').innerHTML = html;
}
async function load(){
  const res = await fetch(`results.json?ts=${Date.now()}`); cache = await res.json();
  document.getElementById('meta').textContent = `Обновлено: ${cache.generated_at}`;
  renderTable(); renderHeats();
}
divSel.onchange = () => { if(cache){ renderTable(); renderHeats(); } };
wodSel.onchange = () => { if(cache){ renderHeats(); } };
load(); setInterval(load, 5000);
</script>
</body>
</html>
